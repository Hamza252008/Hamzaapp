<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>بنك الأسئلة · العلوم الحياتية</title>
  <style>
    :root{--bg:#0f172a;--card:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--accent:#818cf8;--accent2:#c084fc;--green:#4ade80;--red:#f87171}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;min-height:100vh;padding:16px}
    .container{max-width:700px;margin:0 auto}
    .header{text-align:center;padding:20px 0 16px}
    .header h1{font-size:clamp(22px,6vw,34px);background:linear-gradient(135deg,#38bdf8,#818cf8,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:900;margin-bottom:6px}
    .header .author{color:var(--accent2);font-size:14px;font-weight:700}
    .header .desc{color:var(--muted);font-size:12px;margin-top:2px}
    .stats{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
    .stat{flex:1;min-width:70px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center}
    .stat .num{font-size:24px;font-weight:900;display:block}
    .stat .num.blue{color:#38bdf8}.stat .num.green{color:var(--green)}.stat .num.red{color:var(--red)}
    .stat .lbl{font-size:10px;color:var(--muted);margin-top:2px}
    .tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;justify-content:center}
    .tab{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:20px;font-size:11px;cursor:pointer;transition:.2s;font-weight:600}
    .tab:hover{border-color:var(--accent);color:var(--accent2)}
    .tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    .tab .cnt{background:rgba(0,0,0,.2);padding:1px 6px;border-radius:10px;font-size:10px;margin-right:4px}
    .row{display:flex;gap:8px;margin-bottom:12px}
    .btn{flex:1;background:var(--card);border:1px solid var(--border);color:var(--muted);padding:9px;border-radius:12px;cursor:pointer;font-size:12px;font-weight:700;transition:.2s;text-align:center}
    .btn.active{background:rgba(129,140,248,.15);border-color:var(--accent);color:var(--accent)}
    .section-group{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px}
    .section-group h4{color:var(--accent);font-size:14px;font-weight:800;margin-bottom:12px;text-align:center}
    .progress-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:14px}
    .progress-info{display:flex;justify-content:space-between;margin-bottom:6px}
    .progress-info span{font-size:12px;color:var(--muted)}
    .progress-bar{height:6px;background:#334155;border-radius:10px;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,#818cf8,#c084fc);border-radius:10px;transition:width .3s}
    .q-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .q-nav span{font-size:12px;color:var(--muted)}
    .nav-btn{background:var(--card);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px;transition:.2s}
    .nav-btn:hover{border-color:var(--accent)}.nav-btn:disabled{opacity:.3}
    .card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;margin-bottom:16px}
    .card-header{background:linear-gradient(135deg,#1e293b,#0f172a);padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px}
    .q-num{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:900;font-size:14px;min-width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .q-tag{background:rgba(129,140,248,.1);border:1px solid rgba(129,140,248,.3);color:var(--accent);font-size:10px;padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:6px}
    .q-text{font-size:clamp(14px,3.5vw,16px);font-weight:600;line-height:1.7}
    .options{padding:16px;display:flex;flex-direction:column;gap:10px}
    .opt{background:#0f172a;border:2px solid rgba(255,255,255,.08);color:var(--text);padding:14px 18px;border-radius:14px;cursor:pointer;text-align:right;font-size:clamp(13px,3vw,15px);font-weight:500;line-height:1.5;transition:.25s;display:flex;align-items:center;gap:12px;width:100%}
    .opt:hover:not(:disabled){border-color:var(--accent);transform:translateX(-3px)}
    .opt-letter{background:#1e293b;color:var(--accent);font-weight:900;font-size:14px;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--border)}
    .opt-text{flex:1}
    .opt.correct{border-color:var(--green);background:rgba(74,222,128,.1)}.opt.correct .opt-letter{background:var(--green);color:#000;border-color:var(--green)}
    .opt.wrong{border-color:var(--red);background:rgba(248,113,113,.1)}.opt.wrong .opt-letter{background:var(--red);color:#fff;border-color:var(--red)}
    .opt:disabled{cursor:default}
    .result{padding:14px 18px;border-radius:14px;font-size:14px;font-weight:600;display:none;align-items:flex-start;gap:12px;margin-bottom:16px}
    .result.show-c{display:flex;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.4)}
    .result.show-w{display:flex;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.35)}
    .result .icon{font-size:22px;flex-shrink:0}.result .title{font-size:15px;font-weight:800;margin-bottom:4px}
    .show-c .title{color:var(--green)}.show-w .title{color:var(--red)}
    .result .explain{color:var(--muted);font-size:13px;font-weight:400;line-height:1.6}
    .next-btn{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;font-size:15px;font-weight:800;padding:14px;border-radius:14px;cursor:pointer;display:none;transition:.2s}
    .next-btn.show{display:block}
    .skip-btn{display:block;width:100%;text-align:center;background:transparent;border:1px solid rgba(255,255,255,.1);color:var(--muted);padding:8px;border-radius:20px;cursor:pointer;font-size:12px;margin-bottom:8px}
    .score-screen{display:none;text-align:center;padding:40px 20px}
    .score-screen.show{display:block}.score-icon{font-size:60px;margin-bottom:16px}
    .score-title{font-size:24px;color:var(--accent);font-weight:900;margin-bottom:8px}
    .score-big{font-size:56px;font-weight:900;color:#fff;margin:16px 0}.score-big span{color:var(--accent2)}
    .score-msg{font-size:16px;color:var(--muted);margin-bottom:24px}
    .restart-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;font-size:16px;font-weight:800;padding:16px 40px;border-radius:50px;cursor:pointer}
    .lock-box{background:#1e293b;padding:30px;border-radius:20px;text-align:center;max-width:350px;width:90%;margin:100px auto}
    .lock-box h2{color:#818cf8;margin-bottom:20px}
    .lock-box input{width:100%;padding:14px;border-radius:12px;border:2px solid #334155;background:#0f172a;color:#fff;font-size:16px;text-align:center;margin-bottom:12px;outline:none}
    .lock-box input:focus{border-color:#818cf8}
    .lock-box button{width:100%;padding:14px;border-radius:12px;background:#818cf8;color:#fff;border:none;font-size:16px;font-weight:700;cursor:pointer}
    .lock-box .err{color:#f87171;margin-top:10px;display:none}
    .logout{text-align:center;margin-top:20px}
    .logout button{background:transparent;border:1px solid #f87171;color:#f87171;padding:8px 24px;border-radius:20px;cursor:pointer;font-size:12px}
    .wrong-list{text-align:right;padding:16px;background:var(--card);border-radius:16px;margin-top:16px;display:none}
    .wrong-list h3{color:var(--red);margin-bottom:12px}
    .wrong-list .w-item{padding:10px;background:#0f172a;border-radius:10px;margin-bottom:8px;font-size:13px;border-right:3px solid var(--red)}
    .wrong-list .w-item .q{font-weight:700;margin-bottom:4px}
    .wrong-list .w-item .a{color:var(--green)}.wrong-list .w-item .ya{color:var(--red)}
    @media(max-width:480px){.header h1{font-size:20px}.opt{padding:12px 14px;font-size:13px}}
  </style>
</head>
<body>
<div class="lock-box" id="lockScreen">
	<div style="position:fixed;top:10px;right:10px;background:#1e293b;color:#38bdf8;font-size:13px;font-weight:700;padding:6px 12px;border-radius:20px;border:1px solid #38bdf8;z-index:999">📞 أ. حمزة: 970598417758+</div>
  <h2>🔒 تسجيل الدخول</h2>
  <input type="text" id="userInput" placeholder="الاسم...">
  <input type="password" id="passInput" placeholder="كلمة المرور..." onkeyup="if(event.key==='Enter')checkPass()">
  <button onclick="checkPass()">دخول</button>
  <div class="err" id="errMsg">❌ الاسم أو كلمة المرور خطأ!</div>
  <p style="color:#ef4444;font-size:14px;margin-top:11px">⚠️ تحذير: مشاركة كلمة المرور تؤدي لإلغاء الحساب</p>
</div>
<div class="container" id="app" style="display:none">
  <div class="header"><h1>📚 بنك الأسئلة</h1><div class="author">العلوم الحياتية · الصف الثاني عشر</div><div class="desc">2025-2026</div></div>
  <div class="stats">
    <div class="stat"><span class="num blue" id="sTotal">0</span><span class="lbl">المحاولات</span></div>
    <div class="stat"><span class="num green" id="sCorrect">0</span><span class="lbl">✓ صحيح</span></div>
    <div class="stat"><span class="num red" id="sWrong">0</span><span class="lbl">✗ خطأ</span></div>
    <div class="stat"><span class="num blue" id="sPct">0%</span><span class="lbl">النسبة</span></div>
  </div>
  <div id="allTabs"></div>
  <div class="row"><button class="btn active" id="btnSeq" onclick="setMode('seq')">📖 ترتيبي</button><button class="btn" id="btnRnd" onclick="setMode('rnd')">🔀 عشوائي</button></div>
  <div class="progress-wrap"><div class="progress-info"><span id="progLabel">0 / 0</span><span id="progPct">0%</span></div><div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div></div>
  <div class="q-nav"><span id="qCounter">السؤال 1</span><div><button class="nav-btn" id="prevBtn" onclick="prevQ()" disabled>→ السابق</button><button class="nav-btn" id="nextTopBtn" onclick="nextQ()">التالي ←</button></div></div>
  <div class="card"><div class="card-header"><div class="q-num" id="qNum">1</div><div><div class="q-tag" id="qTag"></div><div class="q-text" id="qText"></div></div></div><div class="options" id="options"></div></div>
  <div class="result" id="result"><span class="icon" id="rIcon"></span><div><div class="title" id="rTitle"></div><div class="explain" id="rExpl"></div></div></div>
  <button class="skip-btn" onclick="skipQ()">⏭ تخطي هذا السؤال</button>
  <button class="next-btn" id="nextMain" onclick="nextQ()">السؤال التالي ←</button>
  <div class="logout"><button onclick="logout()">🚪 تسجيل خروج</button></div>
</div>
<div class="score-screen" id="scoreScreen">
  <div class="score-icon">🏆</div><div class="score-title">أحسنت! انتهيت من الأسئلة</div>
  <div class="score-big" id="scoreBig">0<span>/0</span></div><div class="score-msg" id="scoreMsg"></div>
  <div class="wrong-list" id="wrongList"></div>
  <button class="restart-btn" onclick="restart()">🔄 إعادة المحاولة</button>
</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/1N0nA8VWHjoZSHn9yhRO8NY8skEr6z92ivV-P0m1mfh0/export?format=csv";
const USERS = {}; const DEVICE_LOG = {}; const wrongAnswers = []; let USERS_LOADED = false;

async function loadUsers() {
  try {
    const resp = await fetch(SHEET_URL); const text = await resp.text();
    const lines = text.trim().split('\n'); lines.shift();
    lines.forEach(line => { const parts = line.split(','); if (parts.length >= 2) { const name = parts[0].trim(); const pass = parts[1].trim(); if (name && pass) USERS[name] = pass; }});
    USERS_LOADED = true;
  } catch(e) { USERS["حمزة طافش"] = "2094"; USERS_LOADED = true; }
}

function getDeviceID() {
  let id = localStorage.getItem('device_fingerprint');
  if (!id) { id = 'dev_' + Math.random().toString(36).substring(2, 15) + '_' + Date.now(); localStorage.setItem('device_fingerprint', id); }
  return id;
}

function checkPass() {
  if (!USERS_LOADED) { document.getElementById('errMsg').style.display = 'block'; document.getElementById('errMsg').textContent = '⏳ جاري تحميل البيانات...'; return; }
  const name = document.getElementById('userInput').value.trim();
  const pass = document.getElementById('passInput').value;
  const deviceID = getDeviceID();
  if (USERS[name] && USERS[name] === pass) {
    if (!DEVICE_LOG[name]) { DEVICE_LOG[name] = { device: deviceID, active: true }; saveAndOpen(name, deviceID); }
    else if (DEVICE_LOG[name].device === deviceID) { saveAndOpen(name, deviceID); }
    else { DEVICE_LOG[name].active = false; document.getElementById('errMsg').style.display = 'block'; document.getElementById('errMsg').textContent = '🚫 تم استخدام كلمة السر على جهاز آخر! تم إلغاء الحساب.'; document.getElementById('lockScreen').innerHTML = '<h2 style="color:#f87171">تم تعطيل الحساب</h2><p style="color:#94a3b8">تواصل مع المشرف لإعادة تفعيل الحساب</p>'; }
  } else { document.getElementById('errMsg').style.display = 'block'; document.getElementById('errMsg').textContent = '❌ الاسم أو كلمة المرور خطأ!'; }
}

function saveAndOpen(name, deviceID) { localStorage.setItem('quiz_user', name); localStorage.setItem('quiz_device', deviceID); document.getElementById('lockScreen').style.display = 'none'; document.getElementById('app').style.display = 'block'; rTabs(); }
function logout() { document.getElementById('lockScreen').style.display = 'block'; document.getElementById('app').style.display = 'none'; document.getElementById('passInput').value = ''; document.getElementById('userInput').value = ''; }

window.onload = async function() {
  await loadUsers();
  const savedUser = localStorage.getItem('quiz_user'); const savedDevice = localStorage.getItem('quiz_device'); const currentDevice = getDeviceID();
  
};

const Q = [
  {n:1,s:"البناء الضوئي",q:"ما مصدر الزيادة في كتلة النبات الحية؟",o:["الماء وثاني أكسيد الكربون","الماء وسكر الجلوكوز","االمالح واألسمدة التي يتم امتصاصها من التربة","ثاني أكسيد الكربون"],a:3},
  {n:2,s:"البناء الضوئي",q:"ما مصير اإللكترونات التي تغادر النظام الضوئي الثاني؟",o:["تعود إلى النظام الضوئي الذي انطلقت منه","تلزم إلنتاج ATP فقط","تحلل الماء","تستخدم لتحويل NADP+ الى NADPH"],a:3},
  {n:3,s:"البناء الضوئي",q:"يقع الضوء الأحمر والأزرق والأخضر ضمن الطيف المرئي أي منهم يمتلك طاقة أعلى:",o:["األحمر","األزرق","األخضر","جميعهم لديهم طاقة متساوية"],a:1},
  {n:4,s:"البناء الضوئي",q:"ما الهيكل الكربوني الأول والناتج عن عملية البناء الضوئي؟",o:["النشا","سيليوز","غلوكوز","غليسر الدهايد"],a:3},
  {n:5,s:"البناء الضوئي",q:"تنتج خاليا النبات غليسر الدهايد احادي الفوسفات في:",o:["الثايالكويد","حشوة المايتوكندريا","ستروما البالستيدة","السيتوسول"],a:2},
  {n:6,s:"البناء الضوئي",q:"ما الموجات الضوئية التي تمتصها أصباغ كلوروفيل a و b والكاروتين؟",o:["الحمراء والخضراء بكميات كبيرة وتعكس األزرق","الحمراء والزرقاء بكميات كبيرة وتعكس األخضر","الحمراء وفوق البنفسجية بكميات كبيرة وتعكس األخضر","الخضراء والزرقاء بكميات كبيرة وتعكس األحمر."],a:1},
  {n:7,s:"البناء الضوئي",q:"أي الموجات الضوئية اآلتية لا تمتصها الجزيئات الصبغية؟",o:["الحمراء","الزرقاء","الصفراء","الخضراء"],a:3},
  {n:8,s:"البناء الضوئي",q:"يتكون مركز التفاعل في النظام الضوئي الأول والثاني في البالستيدات الخضراء من:",o:["جزيئان من كلوروفيل b ومستقبل الكتروني أولي","جزئ كلوروفيل a ومستقبل الكتروني أولي","جزيئان من كلوروفيل a ومستقبل الكترونات أولي","جزئ من كلوروفيل a,b ومستقبل الكتروني أولي"],a:2},
  {n:9,s:"البناء الضوئي",q:"ما الذي يعوض اإللكترونات التي يفقدها النظام الضوئي الأول في العمليات الالحلقية للبناء الضوئي؟",o:["تحلل الماء","السيتوكرومات","النظام الضوئي الثاني","NADP"],a:2},
  {n:10,s:"البناء الضوئي",q:"أي من التالية من نواتج التفاعالت الضوئية للمسار اإللكتروني الحلقي في عملية البناء الضوئي؟",o:["ATP + NADPH","ATP فقط","NADPH فقط","NADPH"],a:1},
  {n:11,s:"البناء الضوئي",q:"إذا علمت أن كمية األكسجين الناتجة عن البناء الضوئي 24 جزيء، ما كمية NADPH المستخدمة؟",o:["84","72","48","36"],a:2},
  {n:12,s:"البناء الضوئي",q:"ما الجزء القادر على إطالق الكترونات منشطة في النظام الضوئي تنتجه المتصاص الطاقة الضوئية؟",o:["مركز التفاعل","مستقبل الكترونات أولي","جزيئا الكلوروفيل","انواع مختلفة من الصبغات"],a:0},
  {n:13,s:"البناء الضوئي",q:"بماذا يتم فصل جزيئات الماء في ثيالكويد النظام الضوئي الثاني في التفاعالت الضوئية؟",o:["بروتين خاص","بروتين ناقل","أنزيم خاص","مستقبل بروتيني"],a:2},
  {n:14,s:"البناء الضوئي",q:"أي المركبات األتية هو أول مركب كربوهيدراتي ثابت تنتجه النباتات؟",o:["الغلوكوز","غليسر الدهايد ثالثي الفوسفات","غلسر الدهايد ثنائي الفوسفات","غلسر الدهايد أحادي الفوسفات"],a:3},
  {n:15,s:"البناء الضوئي",q:"كم عدد ذرات الكربون في (االستيالدهايد، وحمض غلسرين ثنائي الفوسفات) حسب التسلسل؟",o:["(3,2)","(3,3)","(2,3)","(2,2)"],a:2},
  {n:16,s:"البناء الضوئي",q:"أي من اآلتي يعد من نواتج التفاعالت الضوئية للمسار اإللكتروني الحلقي في عملية البناء الضوئي؟",o:["ATP","NADPH + ATP","NADPH + ATP","NADPH"],a:0},
  {n:17,s:"البناء الضوئي",q:"ما عدد جزيئات CO2 التي تم تثبيتها عند استهالك ATP 18 في مرحلة االختزال من حلقة كالفن؟",o:["27","2","9","6"],a:3},

  {n:274,s:"الجاميتات - الوراثة المندلية",q:"الطراز الجيني الصحيح للغاميت المتوقع ان يعطيه الفرد ذو الطراز الجيني (TtRRGgaa) هو:",o:["TtGa","TRga","tRgA","Trga"],a:1},
  {n:275,s:"الجاميتات - الوراثة المندلية",q:"ما عدد انواع الطرز الجينية الناتجة من تزاوج فردين يحمل احداهما الطراز الجيني AABbCc واالخر AaBbcc؟",o:["4","8","12","16"],a:2},
  {n:276,s:"الجاميتات - الوراثة المندلية",q:"ما عدد الجاميتات في الجيل الثاني لدى الفرد ذو التركيب الجيني AaBbDDCc؟",o:["2","4","6","8"],a:3},
  {n:277,s:"الجاميتات - الوراثة المندلية",q:"إذا كانت احدى الصفات تخضع لتاثير زوجين من الجينات فان المشيج يحتوي:",o:["جين واحد","جينان","ثالثة جينات","اربعة جينات"],a:1},
  {n:278,s:"الجاميتات - الوراثة المندلية",q:"إذا كان التركيب الجيني لفرد ما هو AaBB فان تركيب امشاجه تكون:",o:["Aa, BB","AB, AB","AB, aB","Aa, AB"],a:2}
];

const S = {};
Q.forEach(q => { if (!S[q.s]) S[q.s] = []; S[q.s].push(q); });

let sec = Object.keys(S)[0], list = [], idx = 0, answered = false;
let correct = 0, wrong = 0, total = 0, mode = 'seq';

function rTabs() {
  const container = document.getElementById('allTabs');
  container.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.className = 'tab' + (sec === '__all__' ? ' active' : '');
  allBtn.innerHTML = `الكل <span class="cnt">${Q.length}</span>`;
  allBtn.onclick = () => selSec('__all__');
  container.appendChild(allBtn);
  
  const groups = {'☀️ البناء الضوئي والتنفس':[],'🧬 الوراثة المندلية':[],'🔬 من الجين إلى البروتين':[]};
  Object.entries(S).forEach(([s, qs]) => {
    if (s.includes('البناء') || s.includes('التنفس')) groups['☀️ البناء الضوئي والتنفس'].push({s, qs});
    else if (s.includes('مندل') || s.includes('قانون') || s.includes('احتمال') || s.includes('جاميت')) groups['🧬 الوراثة المندلية'].push({s, qs});
    else groups['🔬 من الجين إلى البروتين'].push({s, qs});
  });
  
  Object.entries(groups).forEach(([title, items]) => {
    if (items.length > 0) {
      const div = document.createElement('div');
      div.className = 'section-group';
      div.innerHTML = `<h4>${title}</h4>`;
      const tabsDiv = document.createElement('div');
      tabsDiv.className = 'tabs';
      items.forEach(({s, qs}) => {
        const b = document.createElement('button');
        b.className = 'tab' + (sec === s ? ' active' : '');
        b.innerHTML = `${s.split(' - ')[0]} <span class="cnt">${qs.length}</span>`;
        b.onclick = () => selSec(s);
        tabsDiv.appendChild(b);
      });
      div.appendChild(tabsDiv);
      container.appendChild(div);
    }
  });
}

function selSec(s) { sec = s; correct = 0; wrong = 0; total = 0; wrongAnswers.length = 0; updStats(); rTabs(); list = s === '__all__' ? [...Q] : [...S[s]]; if (mode === 'rnd') shuf(list); idx = 0; document.getElementById('scoreScreen').classList.remove('show'); document.getElementById('app').style.display = 'block'; renderQ(); }
function setMode(m) { mode = m; document.getElementById('btnSeq').classList.toggle('active', m === 'seq'); document.getElementById('btnRnd').classList.toggle('active', m === 'rnd'); if (m === 'rnd') shuf(list); idx = 0; renderQ(); }
function shuf(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } }

function renderQ() {
  if (idx >= list.length) { showScore(); return; }
  const q = list[idx]; answered = false;
  document.getElementById('result').className = 'result';
  document.getElementById('nextMain').classList.remove('show');
  document.getElementById('qNum').textContent = q.n;
  document.getElementById('qTag').textContent = q.s;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('qCounter').textContent = `السؤال ${idx + 1} من ${list.length}`;
  const pct = Math.round((idx / list.length) * 100);
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progLabel').textContent = `${idx} / ${list.length}`;
  document.getElementById('progPct').textContent = pct + '%';
  document.getElementById('prevBtn').disabled = idx === 0;
  const g = document.getElementById('options'); g.innerHTML = '';
  q.o.forEach((x, j) => {
    const b = document.createElement('button'); b.className = 'opt';
    b.innerHTML = `<span class="opt-letter">${['أ','ب','ج','د'][j]}</span><span class="opt-text">${x}</span>`;
    b.onclick = () => selAns(b, j, q); g.appendChild(b);
  });
}

function selAns(btn, j, q) {
  if (answered) return;
  answered = true; total++;
  document.querySelectorAll('.opt').forEach(b => b.disabled = true);
  const isC = j === q.a;
  if (isC) { correct++; btn.classList.add('correct'); }
  else { wrong++; btn.classList.add('wrong'); document.querySelectorAll('.opt')[q.a].classList.add('correct'); wrongAnswers.push({q:q.q, s:q.s, n:q.n, y:q.o[j], c:q.o[q.a]}); }
  const r = document.getElementById('result');
  r.className = 'result ' + (isC ? 'show-c' : 'show-w');
  document.getElementById('rIcon').textContent = isC ? '✅' : '❌';
  document.getElementById('rTitle').textContent = isC ? 'إجابة صحيحة!' : `إجابة خاطئة · الصحيح: ${['أ','ب','ج','د'][q.a]}`;
  document.getElementById('rExpl').textContent = isC ? 'أحسنت! استمر.' : 'راجع هذا السؤال لاحقاً.';
  updStats(); document.getElementById('nextMain').classList.add('show');
}

function updStats() { document.getElementById('sTotal').textContent = total; document.getElementById('sCorrect').textContent = correct; document.getElementById('sWrong').textContent = wrong; document.getElementById('sPct').textContent = total > 0 ? Math.round((correct / total) * 100) + '%' : '0%'; }
function nextQ() { idx++; renderQ(); }
function prevQ() { if (idx > 0) { idx--; renderQ(); } }
function skipQ() { idx++; if (idx >= list.length) showScore(); else renderQ(); }

function showScore() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('scoreScreen').classList.add('show');
  const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
  document.getElementById('scoreBig').innerHTML = `${correct}<span>/${total}</span>`;
  let m = pct >= 90 ? '🌟 ممتاز!' : pct >= 75 ? '👏 جيد جداً!' : pct >= 60 ? '💪 جيد!' : '📚 راجع أكثر!';
  document.getElementById('scoreMsg').textContent = `${m} · النسبة: ${pct}%`;
  const wl = document.getElementById('wrongList');
  if (wrongAnswers.length > 0) { wl.style.display = 'block'; wl.innerHTML = '<h3>📋 الأسئلة الخاطئة:</h3>' + wrongAnswers.map(w => `<div class="w-item"><div class="q">${w.n}. [${w.s}] ${w.q}</div><div class="ya">❌ إجابتك: ${w.y}</div><div class="a">✅ الصحيح: ${w.c}</div></div>`).join(''); }
  else { wl.style.display = 'none'; }
}

function restart() { correct = 0; wrong = 0; total = 0; idx = 0; wrongAnswers.length = 0; updStats(); if (mode === 'rnd') shuf(list); document.getElementById('scoreScreen').classList.remove('show'); document.getElementById('app').style.display = 'block'; renderQ(); }

rTabs();
</script>
